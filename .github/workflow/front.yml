
name: Frontend CI/CD — TransData RNDC

# ─────────────────────────────────────────────────────────────────
#  FLUJO DE RAMAS
#
#  feature/* ──► develop   →  lint + test + build
#  fix/*      ──► develop   →  lint + test + build
#  develop    (push)        →  lint + test + build + deploy:staging
#  develop    ──► main (PR) →  lint + test + build + pr-gate
#  main       (push)        →  lint + test + build + deploy:production
#
# ─────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "apps/frontend/**"
      - ".github/workflows/front.yml"

  pull_request:
    branches:
      - main       # PR develop → main    (revisión antes de prod)
      - develop    # PR feature/* → develop
    paths:
      - "apps/frontend/**"
      - ".github/workflows/front.yml"

defaults:
  run:
    working-directory: apps/frontend

env:
  NODE_VERSION: "20"
  VITE_API_URL: "http://localhost:8000"

permissions: read-all




# Cancela runs anteriores del mismo PR/rama
concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════════════════════════
  # JOB 1 — LINT Y TYPECHECK
  # Corre en: todas las ramas y PRs
  # ═══════════════════════════════════════════════════════════════
  lint:
    name: "Lint y TypeScript"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript — verificar tipos
        run: npx tsc --noEmit

      - name: ESLint — verificar código
        run: npm run lint

      - name: Prettier — verificar formato
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2 — TESTS
  # Corre en: todas las ramas y PRs
  # ═══════════════════════════════════════════════════════════════
  test:
    name: "Tests con Vitest"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm run test -- --run --reporter=verbose
        env:
          VITE_API_URL: ${{ env.VITE_API_URL }}

      - name: Cobertura de código
        run: npm run test -- --run --coverage
        continue-on-error: true

      - name: Subir cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          file: apps/frontend/coverage/lcov.info
          flags: frontend
        continue-on-error: true

  # ═══════════════════════════════════════════════════════════════
  # JOB 3 — BUILD VITE
  # Corre en: todas las ramas y PRs
  # ═══════════════════════════════════════════════════════════════
  build:
    name: "Build Vite"
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      # En PRs y ramas de desarrollo, apunta al staging del backend
      - name: Build — staging / preview
        if: github.ref != 'refs/heads/main'
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.RENDER_STAGING_URL }}

      # En main, apunta al backend de producción
      - name: Build — producción
        if: github.ref == 'refs/heads/main'
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}

      - name: Analizar tamaño del bundle
        run: |
          echo "=== Tamaño total ==="
          du -sh dist/
          echo ""
          echo "=== Chunks JS (top 10) ==="
          ls -lh dist/assets/*.js 2>/dev/null | sort -k5 -rh | head -10

  # ═══════════════════════════════════════════════════════════════
  # JOB 4 — GATE: PR feature/* o fix/* → develop
  # ═══════════════════════════════════════════════════════════════
  pr-to-develop:
    name: "Gate — PR hacia develop"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'develop'

    steps:
      - name: Verificar rama origen (solo feature/* o fix/*)
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Rama origen: $BRANCH"
          if [[ "$BRANCH" != feature/* && "$BRANCH" != fix/* ]]; then
            echo "Solo se permiten PRs desde feature/* o fix/* hacia develop"
            exit 1
          fi
          echo "Rama origen válida: $BRANCH"

      - name: Comentar resultado en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ github.head_ref }}';
            const sha    = '${{ github.sha }}'.substring(0, 7);
            const body   = [
              `✅ **Frontend — todos los checks pasaron**`,
              ``,
              `| Check | Estado |`,
              `|-------|--------|`,
              `| TypeScript (tsc --noEmit) | ✅ |`,
              `| ESLint + Prettier | ✅ |`,
              `| Tests Vitest | ✅ |`,
              `| Build Vite | ✅ |`,
              ``,
              `Rama \`${branch}\` lista para merge a **develop** (commit \`${sha}\`).`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });

  # ═══════════════════════════════════════════════════════════════
  # JOB 5 — DEPLOY STAGING (Vercel preview)
  # Solo en push a develop
  # ═══════════════════════════════════════════════════════════════
  deploy-staging:
    name: "Deploy → Staging (Vercel preview)"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      github.ref == 'refs/heads/develop' &&
      github.event_name == 'push'

    environment:
      name: staging
      url: ${{ steps.vercel-deploy.outputs.url }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias + Vercel CLI
        run: |
          npm ci
          npm install -g vercel

      - name: Deploy preview a Vercel (staging)
        id: vercel-deploy
        run: |
          vercel pull --yes \
            --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}

          vercel build \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env VITE_API_URL=${{ vars.RENDER_STAGING_URL }}

          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env VITE_API_URL=${{ vars.RENDER_STAGING_URL }})

          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Staging URL: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check — staging
        run: |
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            ${{ steps.vercel-deploy.outputs.url }})
          if [ "$STATUS" != "200" ]; then
            echo "Staging health check falló — status $STATUS"
            exit 1
          fi
          echo "Frontend staging OK en ${{ steps.vercel-deploy.outputs.url }}"

  # ═══════════════════════════════════════════════════════════════
  # JOB 6 — GATE: PR develop → main
  # ═══════════════════════════════════════════════════════════════
  pr-to-main:
    name: "Gate — PR develop → main"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'

    steps:
      - name: Verificar que la rama origen es develop
        run: |
          if [ "${{ github.head_ref }}" != "develop" ]; then
            echo "Solo se permiten merges a main desde la rama develop"
            exit 1
          fi
          echo "Rama origen correcta: develop → main"

      - name: Comentar checklist de aprobación en el PR
        uses: actions/github-script@v7
        with:
          script: |
            const sha  = '${{ github.sha }}'.substring(0, 7);
            const body = [
              `✅ **Frontend listo para producción**`,
              ``,
              `| Check | Estado |`,
              `|-------|--------|`,
              `| TypeScript (tsc --noEmit) | ✅ |`,
              `| ESLint + Prettier | ✅ |`,
              `| Tests Vitest | ✅ |`,
              `| Build Vite (producción) | ✅ |`,
              `| Rama origen | ✅ develop |`,
              ``,
              `> Commit \`${sha}\` — merge aprobado, el deploy a producción`,
              `> se ejecutará automáticamente al hacer merge.`,
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo:  context.repo.repo,
              body,
            });

  # ═══════════════════════════════════════════════════════════════
  # JOB 7 — DEPLOY PRODUCCIÓN (Vercel prod)
  # Solo en push a main
  # ═══════════════════════════════════════════════════════════════
  deploy-production:
    name: "Deploy → Producción (Vercel)"
    runs-on: ubuntu-latest
    needs: [test, build]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.FRONTEND_URL }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias + Vercel CLI
        run: |
          npm ci
          npm install -g vercel

      - name: Deploy producción a Vercel
        run: |
          vercel pull --yes \
            --environment=production \
            --token=${{ secrets.VERCEL_TOKEN }}

          vercel build --prod \
            --token=${{ secrets.VERCEL_TOKEN }}

          vercel deploy --prebuilt --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --env VITE_API_URL=${{ vars.RENDER_BACKEND_URL }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Health check — producción
        run: |
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" ${{ vars.FRONTEND_URL }})
          if [ "$STATUS" != "200" ]; then
            echo "Producción health check falló — status $STATUS"
            exit 1
          fi
          echo "Frontend producción OK en ${{ vars.FRONTEND_URL }}"

      - name: Notificar deploy en commit de main
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const ok  = '${{ job.status }}' === 'success';
            const url = '${{ vars.FRONTEND_URL }}';
            const sha = context.sha.substring(0, 7);
            await github.rest.repos.createCommitComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              commit_sha: context.sha,
              body: ok
                ? `✅ Frontend producción desplegado en [${url}](${url}) — commit \`${sha}\``
                : `❌ Frontend producción falló en commit \`${sha}\` — revisar logs`,
            });
