name: Frontend CI/CD — TransData RNDC

on:
  push:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - ".github/workflows/front.yml"

  pull_request:
    branches:
      - main
    paths:
      - "apps/frontend/**"
      - ".github/workflows/front.yml"

defaults:
  run:
    working-directory: apps/frontend

env:
  NODE_VERSION: "20"

permissions: read-all

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: "Lint y TypeScript"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: TypeScript — verificar tipos
        run: npx tsc --noEmit

      - name: ESLint — verificar código
        run: npm run lint

      - name: Prettier — verificar formato
        run: npx prettier --check "src/**/*.{ts,tsx,css}"

  test:
    name: "Tests con Vitest"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm run test -- --run --reporter=verbose
        env:
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}

      - name: Cobertura de código
        run: npm run test -- --run --coverage
        continue-on-error: true

  build:
    name: "Build Vite"
    runs-on: ubuntu-latest
    needs: [lint, test]

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build producción
        run: npm run build
        env:
          VITE_API_URL: ${{ vars.RENDER_BACKEND_URL }}

      - name: Analizar tamaño del bundle
        run: |
          echo "=== Tamaño total ==="
          du -sh dist/
          echo ""
          echo "=== Chunks JS (top 10) ==="
          ls -lh dist/assets/*.js 2>/dev/null | sort -k5 -rh | head -10
